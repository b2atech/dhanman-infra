version: '3.8'

services:
  dhanman-common:
    image: ghcr.io/b2atech/dhanman-common:v1.0.0
    container_name: dhanman-common-prod
    restart: always
    ports:
      - "5200:80"
    env_file:
      - ./env/common.env
    volumes:
      - /var/www/prod/logs/common:/logs
    networks:
      - dhanman-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  dhanman-sales:
    image: ghcr.io/b2atech/dhanman-sales:v1.0.0
    container_name: dhanman-sales-prod
    restart: always
