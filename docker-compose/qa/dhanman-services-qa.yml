      - dhanman-qa-network
    depends_on:
      - dhanman-common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dhanman-community:
    image: ghcr.io/b2atech/dhanman-community:develop
    container_name: dhanman-community-qa
    restart: always
    ports:
      - "5205:80"
    env_file:
      - ./env/community.env
    volumes:
      - /var/www/qa/logs/community:/logs
    networks:
      - dhanman-qa-network
    depends_on:
      - dhanman-common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dhanman-qa-network:
    driver: bridge
