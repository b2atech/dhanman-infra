      - dhanman-common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dhanman-inventory:
    image: ghcr.io/b2atech/dhanman-inventory:develop
    container_name: dhanman-inventory-qa
    restart: always
