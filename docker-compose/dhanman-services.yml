      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dhanman-inventory:
    image: ghcr.io/b2atech/dhanman-inventory:latest
    container_name: dhanman-inventory
    restart: always
    ports:
      - "5204:80"
    env_file:
      - ./env/inventory.env
    volumes:
      - /var/www/logs/inventory:/logs
    networks:
      - dhanman-network
    depends_on:
      - dhanman-common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dhanman-community:
    image: ghcr.io/b2atech/dhanman-community:latest
    container_name: dhanman-community
    restart: always
    ports:
      - "5205:80"
    env_file:
      - ./env/community.env
    volumes:
      - /var/www/logs/community:/logs
    networks:
      - dhanman-network
    depends_on:
      - dhanman-common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  dhanman-network:
    driver: bridge
