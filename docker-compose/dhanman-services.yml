      - dhanman-network
    depends_on:
      - dhanman-common
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dhanman-payroll:
    image: ghcr.io/b2atech/dhanman-payroll:latest
    container_name: dhanman-payroll
    restart: always
    ports:
      - "5203:80"
    env_file:
      - ./env/payroll.env
