---
- name: Create RabbitMQ data directory
  file:
    path: "{{ rabbitmq_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy RabbitMQ docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ rabbitmq_data_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart rabbitmq

- name: Start RabbitMQ container
  community.docker.docker_compose_v2:
    project_src: "{{ rabbitmq_data_dir }}"
    state: present
  register: rabbitmq_compose_result

