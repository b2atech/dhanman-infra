---
# ansible/roles/infra_verify/tasks/main.yml
# Deploy infra-verify read-only check engine to host.
# Tasks: create user, copy files, set permissions, SMTP config, cron entry.

# ============================================================================
# User & Group Setup
# ============================================================================

- name: Create infraverify group
  group:
    name: "{{ infraverify_group }}"
    state: present

- name: Create infraverify user
  user:
    name: "{{ infraverify_user }}"
    group: "{{ infraverify_group }}"
    home: "{{ infraverify_home }}"
    shell: "{{ infraverify_shell }}"
    state: present
    system: yes

- name: Add infraverify to systemd-journal group (for SVC-06 journal reads)
  user:
    name: "{{ infraverify_user }}"
    groups: "{{ infraverify_group }},systemd-journal"
    append: yes
    state: present

# ============================================================================
# Directory & File Deployment
# ============================================================================

- name: Create infra-verify destination directory
  file:
    path: "{{ infra_verify_dest }}"
    owner: "{{ infraverify_user }}"
    group: "{{ infraverify_group }}"
    mode: '0755'
    state: directory

- name: Copy engine files from repo to host
  synchronize:
    src: "{{ infra_verify_repo_source }}/"
    dest: "{{ infra_verify_dest }}/"
    rsync_path: "sudo rsync"
    delete: yes
    rsync_opts:
      - "--exclude=history"
      - "--exclude=.bats"
      - "--exclude=tests"

- name: Set ownership of engine files
  file:
    path: "{{ infra_verify_dest }}"
    owner: "{{ infraverify_user }}"
    group: "{{ infraverify_group }}"
    recurse: yes
    state: directory

- name: Make entrypoint executable
  file:
    path: "{{ infra_verify_dest }}/bin/run-infra-report.sh"
    owner: "{{ infraverify_user }}"
    group: "{{ infraverify_group }}"
    mode: '0755'
    state: file

- name: Create history directory (for reports)
  file:
    path: "{{ infra_verify_history_dir }}"
    owner: "{{ infraverify_user }}"
    group: "{{ infraverify_group }}"
    mode: '0755'
    state: directory

- name: Create audit log directory
  file:
    path: "{{ infra_verify_audit_dir }}"
    owner: root
    group: adm
    mode: '0755'
    state: directory

# ============================================================================
# ACL Setup: Log Directory Access
# ============================================================================

- name: Install acl utility (for setfacl)
  package:
    name: acl
    state: present

- name: Grant infraverify read access to service logs directory
  acl:
    path: "{{ services_base_dir }}/logs"
    entity: "{{ infraverify_user }}"
    etype: user
    permissions: rx
    state: present

# ============================================================================
# SMTP Configuration (Vault-sourced)
# ============================================================================

- name: Install msmtp (report email delivery, Phase 10.1)
  package:
    name: msmtp
    state: present

- name: Fetch SMTP credentials from Vault
  set_fact:
    vault_smtp_username: "{{ lookup('hashi_vault', 'secret=secret/shared/global:smtp_username') }}"
    vault_smtp_password: "{{ lookup('hashi_vault', 'secret=secret/shared/global:smtp_password') }}"
  no_log: yes

- name: Render msmtprc config (SMTP credentials from Vault)
  template:
    src: msmtprc.j2
    dest: /root/.msmtprc
    owner: root
    group: root
    mode: '0600'
  vars:
    infra_verify_smtp_host: "{{ smtp_host }}"
    infra_verify_smtp_port: "{{ smtp_port }}"
    infra_verify_smtp_from: "{{ smtp_from }}"
    infra_verify_smtp_use_tls: "{{ smtp_use_tls }}"
  no_log: yes

# ============================================================================
# Cron Job Setup
# ============================================================================

- name: Render cron wrapper script
  template:
    src: cron-run.sh.j2
    dest: "{{ infra_verify_dest }}/cron-run.sh"
    owner: root
    group: root
    mode: '0755'
  vars:
    infra_verify_dest: "{{ infra_verify_dest }}"
    infra_verify_lock_file: "{{ infra_verify_lock_file }}"
    infra_verify_log_level: "{{ infra_verify_log_level }}"
    infra_verify_recipients: "{{ infra_verify_recipients }}"

- name: Install daily cron job
  cron:
    name: "{{ infra_verify_cron_name }}"
    user: root
    minute: "{{ infra_verify_schedule_minute }}"
    hour: "{{ infra_verify_schedule_hour }}"
    job: "{{ infra_verify_dest }}/cron-run.sh"
    cron_file: "{{ infra_verify_cron_name }}"
    state: present

# ============================================================================
# Repair Script Deployment (Phase 10.6)
# ============================================================================
# Deploys operations/repairs/ (Phase 8) so the scripts actually exist on
# the host to be run manually, and grants a dedicated, least-privilege
# group (not the unprivileged infraverify account, not blanket sudo) the
# ability to run exactly the approved repair scripts via sudo.

- name: Create repairs deployment directory
  file:
    path: "{{ infra_verify_repairs_dest }}"
    owner: root
    group: root
    mode: '0755'
    state: directory

- name: Copy repair scripts from repo to host
  synchronize:
    src: "{{ infra_verify_repairs_source }}/"
    dest: "{{ infra_verify_repairs_dest }}/"
    rsync_path: "sudo rsync"
    delete: yes
    rsync_opts:
      - "--exclude=*.bats"
      # backups/ is a runtime directory created below, not part of the
      # source tree — without this exclude, --delete wipes every stored
      # rollback backup (and its checksum) on each re-run of this role.
      - "--exclude=backups"

- name: Set ownership of repair script files
  file:
    path: "{{ infra_verify_repairs_dest }}"
    owner: root
    group: root
    recurse: yes

- name: Make repair scripts executable
  # Explicit loop, not with_fileglob: with_fileglob evaluates on the
  # control node, not the target host, and /opt/repairs only exists on
  # the target — a glob here would silently match zero files.
  file:
    path: "{{ infra_verify_repairs_dest }}/{{ item }}"
    mode: '0750'
  loop:
    - "service/restart-one-specific-service.sh"
    - "promtail/validate-promtail-config.sh"
    - "promtail/restart-promtail.sh"
    - "prometheus/validate-prometheus-config.sh"

- name: Create repair backup directory (repair-common.sh REPAIR_BACKUP_ROOT default)
  file:
    path: "{{ infra_verify_repairs_dest }}/backups"
    owner: root
    group: root
    mode: '0700'
    state: directory

- name: Create dhanman-ops group
  group:
    name: "{{ infra_verify_ops_group }}"
    state: present

- name: Add configured operators to dhanman-ops group
  user:
    name: "{{ item }}"
    groups: "{{ infra_verify_ops_group }}"
    append: yes
  loop: "{{ dhanman_ops_members | default([]) }}"

- name: Deploy per-script sudoers entries for repair scripts
  template:
    src: sudoers-repair-script.j2
    dest: "/etc/sudoers.d/dhanman-repairs-{{ item.name }}"
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  vars:
    repair_script_path: "{{ infra_verify_repairs_dest }}/{{ item.rel_path }}"
  loop:
    - name: "restart-service"
      rel_path: "service/restart-one-specific-service.sh"
    - name: "promtail-validate"
      rel_path: "promtail/validate-promtail-config.sh"
    - name: "promtail-restart"
      rel_path: "promtail/restart-promtail.sh"
    - name: "prometheus-validate"
      rel_path: "prometheus/validate-prometheus-config.sh"

# ============================================================================
# Verification
# ============================================================================

- name: Verify engine files deployed
  stat:
    path: "{{ infra_verify_dest }}/bin/run-infra-report.sh"
  register: engine_stat

- name: Fail if engine not deployed
  fail:
    msg: "Engine deployment failed; entrypoint not found at {{ infra_verify_dest }}/bin/run-infra-report.sh"
  when: not engine_stat.stat.exists

- name: Verify cron job installed
  command: grep "{{ infra_verify_cron_name }}" /etc/cron.d/*
  register: cron_check
  failed_when: cron_check.rc != 0
  changed_when: no

- name: Verify repair scripts deployed
  stat:
    path: "{{ infra_verify_repairs_dest }}/lib/repair-common.sh"
  register: repairs_stat

- name: Fail if repair scripts not deployed
  fail:
    msg: "Repair script deployment failed; repair-common.sh not found at {{ infra_verify_repairs_dest }}/lib/repair-common.sh"
  when: not repairs_stat.stat.exists

- name: Verify sudoers entries installed
  stat:
    path: "/etc/sudoers.d/dhanman-repairs-{{ item }}"
  register: sudoers_stat
  loop:
    - restart-service
    - promtail-validate
    - promtail-restart
    - prometheus-validate

- name: Fail if any sudoers entry is missing
  fail:
    msg: "Sudoers entry missing: /etc/sudoers.d/dhanman-repairs-{{ item.item }}"
  when: not item.stat.exists
  loop: "{{ sudoers_stat.results }}"

- name: Log deployment completion
  debug:
    msg: |
      infra-verify engine deployed successfully.
      - User: {{ infraverify_user }} (groups: systemd-journal)
      - Path: {{ infra_verify_dest }}
      - Cron: {{ infra_verify_schedule_hour }}:{{ infra_verify_schedule_minute }} daily
      - History: {{ infra_verify_history_dir }}
      - Audit: {{ infra_verify_audit_dir }}
      - Report recipients: {{ infra_verify_recipients }}
      - Repair scripts: {{ infra_verify_repairs_dest }} (backups: {{ infra_verify_repairs_dest }}/backups)
      - Repair sudo access: group {{ infra_verify_ops_group }} (add operators to this group manually)
