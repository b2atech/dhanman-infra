---
- name: Ensure service directory exists
  ansible.builtin.file:
    path: "/var/www/qa/{{ service_name }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy environment file
  ansible.builtin.template:
    src: env.j2
    dest: "/var/www/qa/{{ service_name }}/.env"
    mode: '0644'

- name: Copy docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "/var/www/qa/{{ service_name }}/docker-compose.yml"
    mode: '0644'

- name: Login to GitHub Container Registry
  ansible.builtin.shell: |
    echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
  when: ghcr_token is defined and ghcr_username is defined
  no_log: true

- name: Pull latest Docker image
  ansible.builtin.shell: |
    docker compose -f /var/www/qa/{{ service_name }}/docker-compose.yml pull

- name: Start service with Docker Compose
  ansible.builtin.shell: |
    docker compose -f /var/www/qa/{{ service_name }}/docker-compose.yml up -d
