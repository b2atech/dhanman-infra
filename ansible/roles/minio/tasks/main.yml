---
- name: Create MinIO data directory
  file:
    path: "{{ minio_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create MinIO storage directory
  file:
    path: "{{ minio_storage_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy MinIO docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ minio_data_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart minio

- name: Start MinIO container
  community.docker.docker_compose_v2:
    project_src: "{{ minio_data_dir }}"
    state: present

handlers:
  - name: restart minio
    community.docker.docker_compose_v2:
      project_src: "{{ minio_data_dir }}"
      state: present
      recreate: always
